<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <style>
        /* ==========================================================================
           MAGIC RESPONSIF UNTUK TELEFON (CONTACT PAGE)
           ========================================================================== */
        @media (max-width: 768px) {
            body {
                overflow-x: hidden !important;
            }
            
            /* Bagi ruang di atas supaya borang tak tersembunyi di bawah navbar */
            .container {
                margin-top: 140px !important; 
                padding: 0 20px !important;
            }

            .contact-wrapper {
                width: 100% !important;
                max-width: 100% !important;
                box-sizing: border-box !important;
            }

            .page-title {
                font-size: 2rem !important; /* Kecilkan sikit tajuk dekat fon */
                text-align: center !important;
                margin-bottom: 30px !important;
            }

            /* Besarkan ruang input sikit supaya senang jari nak tekan/taip */
            .minimal-form .form-field input,
            .minimal-form .form-field textarea {
                font-size: 16px !important; /* Elak iOS daripada auto-zoom bila fokus input */
                padding: 12px 10px !important;
            }

            .submit-btn {
                width: 100% !important; /* Paksa butang jadi lebar penuh skrin telefon */
                padding: 14px !important;
                font-size: 14px !important;
            }
        }

        @media (max-width: 767px) {
    .navbar {
        flex-direction: column !important;
        padding: 15px 10px !important;
        gap: 12px !important;
        position: absolute !important;
        width: 100% !important;
        box-sizing: border-box !important;
    }
    .nav-links {
        display: flex !important;
        flex-direction: row !important;
        justify-content: center !important;
        gap: 15px !important;
        padding: 0 !important;
        margin: 0 !important;
        width: 100% !important;
    }
    .nav-links li a {
        font-size: 13px !important;
        padding: 4px 6px !important;
    }
    #theme-toggle {
        position: absolute !important;
        right: 15px !important;
        top: 15px !important;
    }
    main.container {
        margin-top: 160px !important; 
    }
}
    </style>

    <nav class="navbar">
        <div class="logo">PORTFOLIO.©2026</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="blog.html">Blog</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
        <button id="theme-toggle" class="toggle-btn"><i class="fas fa-moon"></i></button>
    </nav>

    <main class="container" style="margin-top: 60px;">
        <div class="contact-wrapper">
            <h2 class="page-title">Let's Connect</h2>
            
            <form id="contact-form" class="minimal-form">
                <div class="form-field">
                    <label>Your Name</label>
                    <input type="text" id="name" required placeholder="Type your full name here">
                </div>
                <div class="form-field">
                    <label>Email Address</label>
                    <input type="email" id="email" required placeholder="your-email@student.unisza.edu.my">
                </div>
                <div class="form-field">
                    <label>Short Message</label>
                    <textarea id="message" rows="3" required placeholder="State your inquiry or purpose..."></textarea>
                </div>
                <button type="submit" class="submit-btn">Send Inquiry</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Mzn.Studio. All Rights Reserved.</p>
        <p>FIK UNISZA // CSD34203_PROJECT</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
