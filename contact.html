<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">PORTFOLIO.©2026</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="blog.html">Blog</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
        <button id="theme-toggle" class="toggle-btn"><i class="fas fa-moon"></i></button>
    </nav>

    <main class="container" style="margin-top: 60px;">
        <div class="contact-wrapper">
            <h2 class="page-title">Let's Connect</h2>
            
            <form id="contact-form" class="minimal-form">
                <div class="form-field">
                    <label>Your Name</label>
                    <input type="text" id="name" required placeholder="Type your full name here">
                </div>
                <div class="form-field">
                    <label>Email Address</label>
                    <input type="email" id="email" required placeholder="your-email@student.unisza.edu.my">
                </div>
                <div class="form-field">
                    <label>Short Message</label>
                    <textarea id="message" rows="3" required placeholder="State your inquiry or purpose..."></textarea>
                </div>
                <button type="submit" class="submit-btn">Send Inquiry</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Mzn.Studio. All Rights Reserved.</p>
        <p>FIK UNISZA // CSD34203_PROJECT</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
